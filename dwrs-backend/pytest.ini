[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: requires running infrastructure (postgres, redis, kafka)
    slow: slow-running tests
addopts =
    --strict-markers
    -q
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
