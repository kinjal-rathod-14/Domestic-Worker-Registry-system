name: DWRS CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. Code Quality & Security ─────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter (flake8)
        run: flake8 services/ shared/ --max-line-length=120

      - name: Run type checker (mypy)
        run: mypy services/ shared/ --ignore-missing-imports

      - name: SAST scan (bandit)
        run: bandit -r services/ shared/ -ll -x tests/

      - name: Dependency vulnerability scan (safety)
        run: safety check --full-report

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main

  # ── 2. Unit Tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dwrs_test
          POSTGRES_USER: dwrs_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://dwrs_user:test_password@localhost:5432/dwrs_test
        run: alembic upgrade head

      - name: Run unit tests with coverage
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://dwrs_user:test_password@localhost:5432/dwrs_test
          REDIS_URL: redis://localhost:6379/0
          UIDAI_AUTH_URL: mock
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          AADHAAR_SALT: ${{ secrets.TEST_AADHAAR_SALT }}
          JWT_PRIVATE_KEY_PATH: ./keys/test_private.pem
          JWT_PUBLIC_KEY_PATH: ./keys/test_public.pem
        run: |
          pytest tests/unit/ -v \
            --cov=services \
            --cov=shared \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  # ── 3. Build Docker Images ────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    strategy:
      matrix:
        service: [auth, registration, verification, risk_scoring, audit]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          docker build \
            --build-arg SERVICE=$SERVICE \
            -t $ECR_REGISTRY/dwrs-$SERVICE:$IMAGE_TAG \
            -t $ECR_REGISTRY/dwrs-$SERVICE:latest \
            -f Dockerfile .

          docker push $ECR_REGISTRY/dwrs-$SERVICE:$IMAGE_TAG
          docker push $ECR_REGISTRY/dwrs-$SERVICE:latest

          # Scan image for vulnerabilities
          aws ecr describe-image-scan-findings \
            --repository-name dwrs-$SERVICE \
            --image-id imageTag=$IMAGE_TAG || true

  # ── 4. Deploy to Production (Blue/Green) ─────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    strategy:
      matrix:
        service: [auth, registration, verification, risk_scoring, audit]
      max-parallel: 1   # Deploy services sequentially to avoid downtime

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (Blue/Green)
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          aws ecs update-service \
            --cluster dwrs-prod \
            --service dwrs-$SERVICE \
            --force-new-deployment \
            --deployment-configuration \
              "maximumPercent=200,minimumHealthyPercent=100,deploymentCircuitBreaker={enable=true,rollback=true}"

          # Wait for deployment to complete
          aws ecs wait services-stable \
            --cluster dwrs-prod \
            --services dwrs-$SERVICE

      - name: Run smoke tests
        run: python tests/smoke/post_deploy_check.py ${{ secrets.PROD_API_URL }}

      - name: Notify on failure
        if: failure()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.ALERTS_SNS_TOPIC }} \
            --message "DWRS deployment failed for ${{ matrix.service }} — SHA: ${{ github.sha }}"

  # ── 5. Database Migrations (separate job, runs before deploy) ────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install alembic asyncpg sqlalchemy

      - name: Run migrations via bastion
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: alembic upgrade head
